; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_port = COM9
monitor_port = COM9
board_build.partitions = huge_app.csv
; Enable 8 MB OPI PSRAM (ESP32-S3-DevKitC-1 N8R8/N16R8 variants).
; Large malloc() calls land in PSRAM automatically under IDF 5.x.
board_build.arduino.memory_type = qio_opi
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DUSE_ESP32_I2S_V1=0
    -Wno-unused-variable
    -Wno-unused-but-set-variable
    -Wno-unused-function
    ;-DUSE_PSRAM
    ; ── Sonic quality tweaks ────────────────────────────────────────────────
    ;-DSONIC_USE_SIN
    -DSONIC_MAX_PITCH=300
    ; ── IDF component includes for PCNT and ADC oneshot ────────────────────
    -I$IDF_PATH/components/driver/pulse_cnt/include
    -I$IDF_PATH/components/esp_adc/include
lib_deps =
    https://github.com/pschatzmann/arduino-audio-tools.git
